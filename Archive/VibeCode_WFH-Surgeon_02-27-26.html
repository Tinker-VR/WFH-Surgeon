<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFH Surgeon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            background-image: radial-gradient(circle, #2a2a2a 0%, #080808 100%);
        }
        #game-container {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 1280px;
            max-height: 100vh;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 1);
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #333;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #000;
            cursor: none; /* Hide default cursor since we draw a custom one */
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
</div>

<script>
/**
 * WFH SURGEON - Modern / Beautified Aesthetic (Juicy Edition)
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = true;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// --- CONSTANTS & CONFIG ---
const CW = canvas.width;
const CH = canvas.height;
const TOP_H = CH * 0.50; 
const BOT_H = CH * 0.50;

const COLORS = {
    orWall: '#E0F2F1', 
    orFloor: '#B2DFDB', 
    deskBg: '#5D4037', 
    laptopBezel: '#212121',
    laptopScreen: '#0D47A1',
    laptopGlow: '#1976D2',
    green: '#00E676',
    red: '#FF5252',
    white: '#FFFFFF',
    black: '#000000',
    gold: '#FFD600',
    gray: '#9E9E9E',
    uiBg: '#F5F5F5',
    uiDark: '#37474F'
};

const ARROWS = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
const ARROW_SYM = { 'ArrowUp': '⇧', 'ArrowDown': '⇩', 'ArrowLeft': '⇦', 'ArrowRight': '⇨' };

const PROCEDURES = ["Left Knee Replacement", "Cranial Decompression", "Triple Bypass", "Emergency Appendectomy", "Kidney Transplant", "Robot-Assisted Tonsillectomy", "Spinal Fusion", "Cybernetic Eye Implant", "Spleen Defrag", "Heart Reboot", "Brain Dusting", "Ghost Removal (Surgical)"];
const PATIENTS = ["John Doe", "Jane Smith", "Patient 8472", "The CEO", "Unknown Drifter", "Your Landlord", "A Literal Dog", "V.I.P. Client", "Three Kids in a Trenchcoat", "Florida Man", "Karen from Accounting", "Your Ex"];

const STORE_ITEMS = [
    {id: 'heart_restore', icon: '❤️', title: 'Black Market Organ', desc: 'Restores 1 lost heart.', price: 2000, consumable: true},
    {id: 'lawyer', icon: '💼', title: 'Lawyer', desc: '+1 Max Heart Cap.', price: 1500},
    {id: 'keyboard', icon: '⌨️', title: 'Mech Keyboard', desc: 'Keys heal Anes. +20% Time', price: 1200},
    {id: 'ethernet', icon: '🔌', title: 'Ethernet', desc: 'Blocks Wi-Fi Lag.', price: 800},
    {id: 'treats', icon: '🐟', title: 'Cat Treats', desc: 'Distracts the Cat.', price: 600},
    {id: 'energy', icon: '🔋', title: 'Energy Drink', desc: 'Anes. drains slow.', price: 1000},
    {id: 'mugLid', icon: '☕', title: 'Mug Lid', desc: 'No coffee spills.', price: 500},
    {id: 'adBlock', icon: '🛑', title: 'AdBlocker Pro', desc: 'Blocks Boss Popups.', price: 900},
    {id: 'powerBank', icon: '⚡', title: 'Power Bank', desc: 'Blocks Low Battery.', price: 850}
];

// --- TESTING VARIABLES ---
const STARTING_CASH = 0; 
const STARTING_RANK = 0; 

// --- GLOBAL STATE ---
const GAME = {
    state: 'MENU', 
    storePage: 0,
    showQuitConfirm: false,
    pendingStart: false,
    cash: STARTING_CASH,
    rank: STARTING_RANK, // Represents current level 0 to 14
    highestRank: STARTING_RANK,
    
    upgrades: { keyboard: false, ethernet: false, treats: false, lawyer: false, energy: false, mugLid: false, adBlock: false, powerBank: false },

    flavorText: "",
    hearts: 3,
    maxHearts: 3,
    anesthesia: 100,
    anesthesiaMax: 100,
    phaseTimer: 0,
    phaseTimerMax: 5000,
    sequence: [],
    currentIndex: 0,
    phasesCompleted: 0,
    phasesNeeded: 10,
    perfectStreak: 0,
    
    // JUICE / ANIMATION TIMERS
    redFlashTimer: 0,
    greenFlashTimer: 0,
    shakeTimer: 0,
    arrowPopTimer: 0,
    
    armReach: 0, 
    armGlitchTimer: 0,
    bloodSpills: [],
    
    hazard: null, 
    hazardTimer: 0,
    hazardNextSpawn: 0,
    
    catClicks: 0,
    adPos: {x:0, y:0, w: 360, h: 180},
    batteryDrag: false,
    plugPos: {x: 0, y: 0},
    socketPos: {x: 0, y: 0},
    dimLevel: 0,
    coffeeWipe: 0,
    routerClicks: 0,
    routerFlashTimer: 0,
    
    inputBuffer: [],
    lastResult: 'WIN', 
    payout: 0,
    
    mouseX: CW/2, mouseY: CH/2,
    lastMouseX: 0, lastMouseY: 0
};

// --- INPUT HANDLING ---
function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    GAME.mouseX = (e.clientX - rect.left) * scaleX;
    GAME.mouseY = (e.clientY - rect.top) * scaleY;
}

window.addEventListener('mousemove', (e) => {
    updateMousePos(e);

    if (GAME.hazard === 'battery' && GAME.batteryDrag) {
        GAME.plugPos.x = GAME.mouseX;
        GAME.plugPos.y = GAME.mouseY;
    }
    
    if (GAME.hazard === 'coffee') {
        const splatX = CW/2;
        const splatY = TOP_H + 160; 
        if (Math.hypot(GAME.mouseX - splatX, GAME.mouseY - splatY) < 220) {
            const dist = Math.hypot(GAME.mouseX - GAME.lastMouseX, GAME.mouseY - GAME.lastMouseY);
            GAME.coffeeWipe += dist;
            if (GAME.coffeeWipe > 2500) clearHazard();
        }
    }
    
    GAME.lastMouseX = GAME.mouseX;
    GAME.lastMouseY = GAME.mouseY;
});

window.addEventListener('mouseup', (e) => {
    updateMousePos(e);
    if (GAME.hazard === 'battery' && GAME.batteryDrag) {
        GAME.batteryDrag = false;
        const dx = GAME.plugPos.x - GAME.socketPos.x;
        const dy = GAME.plugPos.y - GAME.socketPos.y;
        if (Math.sqrt(dx*dx + dy*dy) < 80) clearHazard();
    }
});

window.addEventListener('mousedown', (e) => {
    updateMousePos(e);
    const lx = CW/2 - 400; 
    const ly = TOP_H + 20;
    
    if (GAME.state === 'MENU') {
        const bx1 = lx + 120, bx2 = lx + 310, bx3 = lx + 500, by = ly + 110;
        if (isHover(bx1, by, 160, 60)) { 
            GAME.rank = STARTING_RANK; 
            GAME.hearts = 3;
            GAME.pendingStart = true;
            GAME.state = 'HELP'; 
        }
        if (isHover(bx2, by, 160, 60)) GAME.state = 'STORE';
        if (isHover(bx3, by, 160, 60)) GAME.state = 'HELP';
        return;
    }
    
    if (GAME.state === 'HELP') {
        const mx = CW/2 - 350, my = CH/2 - 310; 
        if (isHover(mx + 630, my + 15, 50, 50) || isHover(CW/2 - 110, my + 545, 220, 50)) {
            if (GAME.pendingStart) {
                GAME.pendingStart = false;
                startOperation();
            } else {
                GAME.state = 'MENU';
            }
        }
        return;
    }
    
    if (GAME.state === 'STORE') {
        if (isHover(lx + 30, ly + 25, 100, 40)) {
            GAME.state = GAME.lastResult === 'WIN' && GAME.phasesCompleted >= GAME.phasesNeeded ? 'RESOLUTION' : 'MENU';
        }
        
        const maxPage = Math.ceil(STORE_ITEMS.length / 4) - 1;
        if (GAME.storePage > 0 && isHover(lx + 600, ly + 30, 40, 30)) GAME.storePage--;
        if (GAME.storePage < maxPage && isHover(lx + 700, ly + 30, 40, 30)) GAME.storePage++;
        
        const pageItems = STORE_ITEMS.slice(GAME.storePage * 4, GAME.storePage * 4 + 4);
        pageItems.forEach((item, i) => {
            const col = i % 2;
            const row = Math.floor(i / 2);
            const ix = lx + 40 + (col * 365);
            const iy = ly + 80 + (row * 65); 
            
            if (isHover(ix + 245, iy + 15, 90, 30)) {
                if (item.consumable) {
                    if (GAME.cash >= item.price && GAME.hearts < GAME.maxHearts) {
                        GAME.cash -= item.price;
                        GAME.hearts++;
                    }
                } else {
                    if (GAME.upgrades[item.id]) return;
                    if (GAME.cash >= item.price) {
                        GAME.cash -= item.price;
                        GAME.upgrades[item.id] = true;
                        if (item.id === 'lawyer') {
                            GAME.maxHearts = 4;
                            GAME.hearts++; // Instantly grant the newly unlocked heart
                        }
                    }
                }
            }
        });
        return;
    }
    
    if (GAME.state === 'RESOLUTION') {
        if (GAME.showQuitConfirm) {
            if (isHover(lx + 220, ly + 140, 160, 50)) { 
                GAME.cash = STARTING_CASH;
                GAME.highestRank = STARTING_RANK;
                GAME.rank = STARTING_RANK; 
                GAME.hearts = 3;
                GAME.maxHearts = 3;
                GAME.upgrades = { keyboard: false, ethernet: false, treats: false, lawyer: false, energy: false, mugLid: false, adBlock: false, powerBank: false };
                GAME.showQuitConfirm = false;
                GAME.state = 'MENU';
                resetHospitalAnimations(); // Fully clear the OR room when going back to the menu
            }
            if (isHover(lx + 420, ly + 140, 160, 50)) { 
                GAME.showQuitConfirm = false;
            }
            return;
        }

        if (GAME.lastResult === 'WIN') {
            if (isHover(lx + 70, ly + 170, 200, 50)) startOperation(); 
            if (isHover(lx + 300, ly + 170, 200, 50)) GAME.state = 'STORE'; 
            if (isHover(lx + 530, ly + 170, 200, 50)) GAME.showQuitConfirm = true; 
        } else {
            const baseCost = (GAME.rank + 1) * 300;
            const cost = Math.max(baseCost, Math.floor(GAME.cash * 0.75));

            if (GAME.cash >= cost && isHover(lx + 70, ly + 170, 200, 50)) {
                GAME.cash -= cost;
                GAME.maxHearts = GAME.upgrades.lawyer ? 4 : 3;
                GAME.hearts = GAME.maxHearts; // Fully replenish all available hearts for the retry
                startOperation(); 
            }
            if (isHover(lx + 300, ly + 170, 200, 50)) {
                GAME.state = 'STORE';
            }
            if (isHover(lx + 530, ly + 170, 200, 50)) {
                GAME.showQuitConfirm = true; 
            }
        }
        return;
    }
    
    if (GAME.state === 'PLAYING') {
        if (GAME.hazard === 'cat') {
            const cx = CW/2; const cy = TOP_H + BOT_H/2;
            if (isHover(cx - 150, cy - 150, 300, 300)) {
                GAME.catClicks++;
                if (GAME.catClicks >= 3) clearHazard();
            }
        }
        else if (GAME.hazard === 'ad') {
            if (isHover(GAME.adPos.x + GAME.adPos.w - 35, GAME.adPos.y + 5, 30, 30)) clearHazard();
        }
        else if (GAME.hazard === 'battery') {
            const dx = GAME.mouseX - GAME.plugPos.x;
            const dy = GAME.mouseY - GAME.plugPos.y;
            if (Math.sqrt(dx*dx + dy*dy) < 70) GAME.batteryDrag = true;
        }
        else if (GAME.hazard === 'lag') {
            const rx = 40; 
            const ry = TOP_H + 90;
            if (isHover(rx - 10, ry - 60, 200, 120)) { 
                GAME.routerClicks++;
                GAME.routerFlashTimer = 150; 
                if (GAME.routerClicks >= 3) clearHazard();
            }
        }
    }
});

window.addEventListener('keydown', (e) => {
    if (GAME.state === 'PLAYING') {
        if (GAME.hazard === 'ad' && e.code === 'Escape') {
            clearHazard(); return;
        }
        if (ARROWS.includes(e.code)) {
            // Prevent default scrolling for arrow keys
            e.preventDefault();
            
            if (['cat', 'battery', 'ad', 'coffee'].includes(GAME.hazard)) return;
            
            if (GAME.hazard === 'lag') {
                GAME.inputBuffer.push({ code: e.code, time: performance.now() + 800 }); 
            } else {
                processArrow(e.code);
            }
        }
    }
});

function processArrow(code) {
    if (code === GAME.sequence[GAME.currentIndex]) {
        GAME.currentIndex++;
        GAME.arrowPopTimer = 100;

        // --- NEW MECH KEYBOARD BUFF: Correct Keys restore Anesthesia ---
        if (GAME.upgrades.keyboard) {
            GAME.anesthesia = Math.min(GAME.anesthesiaMax, GAME.anesthesia + 200);
        }

        if (GAME.currentIndex >= GAME.sequence.length) {
            GAME.armReach = 200; 
            chunkComplete();
        }
    } else {
        GAME.hearts--;
        GAME.redFlashTimer = 150;
        GAME.shakeTimer = 300; 
        GAME.perfectStreak = 0;
        
        GAME.armGlitchTimer = 800;
        for (let b = 0; b < 15; b++) {
            GAME.bloodSpills.push({
                x: (Math.random() * 300) - 150,
                y: (Math.random() * 60) - 30,
                r: Math.random() * 25 + 10
            });
        }

        if (GAME.hearts <= 0) triggerResolution('MALPRACTICE');
    }
}

// --- UTILITIES ---
function isHover(x, y, w, h) {
    return GAME.mouseX >= x && GAME.mouseX <= x + w && GAME.mouseY >= y && GAME.mouseY <= y + h;
}

function drawRect(x, y, w, h, fill, stroke, strokeW = 4) {
    if (fill) { ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); }
    if (stroke) { ctx.lineWidth = strokeW; ctx.strokeStyle = stroke; ctx.strokeRect(x, y, w, h); }
}

if (!ctx.roundRectPolyfill) {
    ctx.roundRectPolyfill = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x+r, y);
        this.arcTo(x+w, y,   x+w, y+h, r);
        this.arcTo(x+w, y+h, x,   y+h, r);
        this.arcTo(x,   y+h, x,   y,   r);
        this.arcTo(x,   y,   x+w, y,   r);
        this.closePath();
        return this;
    }
}

function drawRoundRect(x, y, w, h, r, fill, stroke, strokeW = 4) {
    ctx.roundRectPolyfill(x, y, w, h, r);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.lineWidth = strokeW; ctx.strokeStyle = stroke; ctx.stroke(); }
}

function drawShadowRoundRect(x, y, w, h, r, fill, stroke, strokeW = 4) {
    ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 6;
    drawRoundRect(x, y, w, h, r, fill, stroke, strokeW);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
}

function drawText(text, x, y, size, fill, align = 'left', shadowCol = null, shadowBlur = 0) {
    ctx.font = `bold ${size}px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    
    if (shadowCol) {
        ctx.shadowColor = shadowCol;
        ctx.shadowBlur = shadowBlur;
        ctx.shadowOffsetY = 2;
    }
    
    ctx.fillStyle = fill;
    ctx.fillText(text, x, y);
    
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
}

function drawButton(text, x, y, w, h, color, fontSize = 20, pulse = false) {
    const hover = isHover(x, y, w, h);
    const yOff = hover ? 3 : 0;
    
    if (!hover) {
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 5;
    }
    
    drawRoundRect(x, y + yOff, w, h, 12, hover ? '#FFF' : color, COLORS.black, 3);
    
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    
    let scale = 1;
    if (pulse && !hover) scale = 1 + Math.sin(performance.now() / 200) * 0.04;
    
    ctx.save();
    ctx.translate(x + w/2, y + h/2 + yOff);
    ctx.scale(scale, scale);
    drawText(text, 0, 0, fontSize, hover ? '#000' : '#FFF', 'center');
    ctx.restore();
}

function getRankName(rankIndex) {
    const titles = ['Intern', 'Resident', 'Attending', 'Chief', 'Surgeon General'];
    const title = titles[Math.floor(rankIndex / 3)] || 'God of Surgery';
    const subRank = ['I', 'II', 'III'][rankIndex % 3] || 'III';
    return `${title} ${subRank} ★`;
}

// --- LOGIC ---
function resetHospitalAnimations() {
    GAME.redFlashTimer = 0;
    GAME.greenFlashTimer = 0;
    GAME.shakeTimer = 0;
    GAME.arrowPopTimer = 0;
    GAME.bloodSpills = [];
    GAME.armGlitchTimer = 0;
    GAME.armReach = 0;
}

function startOperation() {
    // --- HAZARD CLEANUP: Ensure NO state carries over ---
    GAME.hazard = null;
    GAME.dimLevel = 0;
    GAME.catClicks = 0;
    GAME.coffeeWipe = 0;
    GAME.routerClicks = 0;
    GAME.inputBuffer = [];
    GAME.batteryDrag = false;
    
    // --- ANIMATION CLEANUP ---
    resetHospitalAnimations();

    // Carry over hearts, but Lawyer sets a temporary cap
    GAME.maxHearts = GAME.upgrades.lawyer ? 4 : 3;
    if (GAME.hearts > GAME.maxHearts) GAME.hearts = GAME.maxHearts;
    
    // MATHEMATICALLY SCALED PROGRESSION (Levels 0 through 14)
    GAME.anesthesiaMax = (45 - (GAME.rank * 1.1)) * 1000;
    if (GAME.upgrades.energy) GAME.anesthesiaMax *= 1.2;
    GAME.anesthesia = GAME.anesthesiaMax;
    
    GAME.phaseTimerMax = 8500 - (GAME.rank * 250);

    // --- MECH KEYBOARD BUFF: +20% time extension ---
    if (GAME.upgrades.keyboard) GAME.phaseTimerMax *= 1.2; 
    
    GAME.phasesNeeded = 3 + Math.floor(GAME.rank * 0.5);
    GAME.phasesCompleted = 0;
    GAME.perfectStreak = 0;
    
    const proc = PROCEDURES[Math.floor(Math.random() * PROCEDURES.length)];
    const pat = PATIENTS[Math.floor(Math.random() * PATIENTS.length)];
    GAME.flavorText = `${proc} | ${pat}`;
    
    GAME.hazardTimer = 0;
    const hazFreqMin = 5000 - (GAME.rank * 210);
    const hazFreqMax = 7000 - (GAME.rank * 210);
    GAME.hazardNextSpawn = hazFreqMin + Math.random() * (hazFreqMax - hazFreqMin);
    GAME.routerFlashTimer = 0;
    
    generateSequence(5 + Math.floor(GAME.rank * 0.45));
    GAME.state = 'PLAYING';
}

function generateSequence(len) {
    GAME.sequence = [];
    for (let i = 0; i < len; i++) {
        GAME.sequence.push(ARROWS[Math.floor(Math.random() * ARROWS.length)]);
    }
    GAME.currentIndex = 0;
    GAME.phaseTimer = GAME.phaseTimerMax;
}

function chunkComplete() {
    GAME.phasesCompleted++;
    GAME.perfectStreak++;
    GAME.greenFlashTimer = 200; 
    
    // Gaining a heart via 3 perfect sequences
    if (GAME.perfectStreak >= 3 && GAME.hearts < GAME.maxHearts) {
        GAME.hearts++;
        GAME.perfectStreak = 0;
    }
    
    if (GAME.phasesCompleted >= GAME.phasesNeeded) {
        triggerResolution('WIN');
    } else {
        generateSequence(5 + Math.floor(GAME.rank * 0.45));
    }
}

function spawnHazard() {
    let pool = [];
    if (!GAME.upgrades.adBlock) pool.push('ad');
    if (!GAME.upgrades.powerBank) pool.push('battery');
    if (!GAME.upgrades.ethernet) pool.push('lag');
    if (!GAME.upgrades.mugLid) pool.push('coffee'); 
    if (!GAME.upgrades.treats) pool.push('cat');
    
    if (pool.length === 0) return;
    
    GAME.hazard = pool[Math.floor(Math.random() * pool.length)];
    GAME.coffeeWipe = 0;
    GAME.routerClicks = 0;
    
    if (GAME.hazard === 'cat') GAME.catClicks = 0;
    if (GAME.hazard === 'ad') {
        const lx = CW/2 - 400;
        const ly = TOP_H + 20;
        GAME.adPos.w = 360; GAME.adPos.h = 180;
        GAME.adPos.x = lx + 30 + (Math.random() * (740 - 360 - 30)); 
        GAME.adPos.y = ly + 30 + (Math.random() * 30); 
    }
    if (GAME.hazard === 'battery') {
        GAME.dimLevel = 0;
        GAME.batteryDrag = false;
        GAME.plugPos = {x: CW/2, y: CH - 100};
        GAME.socketPos = {x: CW - 150, y: CH - 150};
    }
}

function clearHazard() {
    GAME.hazard = null;
    GAME.coffeeWipe = 0;
    GAME.dimLevel = 0;
    
    const hazFreqMin = 5000 - (GAME.rank * 210);
    const hazFreqMax = 7000 - (GAME.rank * 210);
    GAME.hazardNextSpawn = hazFreqMin + Math.random() * (hazFreqMax - hazFreqMin);
}

function triggerResolution(result) {
    GAME.state = 'RESOLUTION';
    GAME.lastResult = result;
    
    // --- HAZARD CLEANUP: Ensure screen isn't dark on next run ---
    GAME.hazard = null; 
    GAME.dimLevel = 0;
    GAME.inputBuffer = [];
    
    if (result === 'WIN') {
        if (GAME.rank < 14) GAME.rank++; // Total 15 Levels (0 to 14)
        
        const base = 200 + (GAME.rank * 100);
        const heartBonus = GAME.hearts * (50 + GAME.rank * 10);
        const timeBonus = Math.floor((GAME.anesthesia / 1000) * 10);
        GAME.payout = base + heartBonus + timeBonus;
        GAME.cash += GAME.payout;
    } else {
        GAME.payout = 0;
    }
    
    // Reset all shift-based upgrades
    GAME.upgrades = { keyboard: false, ethernet: false, treats: false, lawyer: false, energy: false, mugLid: false, adBlock: false, powerBank: false };
}

// --- RENDERERS ---

function drawHospitalBg() {
    drawRect(0, 0, CW, TOP_H, COLORS.orWall);
    drawRect(0, TOP_H - 120, CW, 20, '#B0BEC5'); 
    
    drawRect(0, TOP_H - 100, CW, 100, COLORS.orFloor);
    ctx.strokeStyle = '#80CBC4';
    ctx.lineWidth = 2;
    for(let i=0; i<CW; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, TOP_H - 100); ctx.lineTo(i - 40, TOP_H); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(0, TOP_H - 50); ctx.lineTo(CW, TOP_H - 50); ctx.stroke();

function drawArticulatedArm(startX, startY, targetX, targetY, isErratic, flipBend = false) {
    let dx = targetX - startX;
    let dy = targetY - startY;
    
    let bendDir = flipBend ? -1 : 1;
    let elbowX = startX + dx * 0.4 + (bendDir * 80);
    let elbowY = startY + dy * 0.7;

    if (isErratic) {
        elbowX += (Math.random() - 0.5) * 40;
        elbowY += (Math.random() - 0.5) * 40;
        targetX += (Math.random() - 0.5) * 20;
        targetY += (Math.random() - 0.5) * 20;
    }

    ctx.lineWidth = 20;
    ctx.strokeStyle = isErratic ? '#FF5252' : '#546E7A';
    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(elbowX, elbowY); ctx.stroke();

    ctx.lineWidth = 14;
    ctx.strokeStyle = '#78909C';
    ctx.beginPath(); ctx.moveTo(elbowX, elbowY); ctx.lineTo(targetX, targetY); ctx.stroke();

    ctx.fillStyle = '#263238';
    ctx.beginPath(); ctx.arc(startX, startY, 22, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#37474F';
    ctx.beginPath(); ctx.arc(elbowX, elbowY, 16, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = isErratic ? '#FF1744' : '#00E676'; 
    ctx.beginPath(); ctx.arc(elbowX, elbowY, 5, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = '#ECEFF1';
    ctx.beginPath(); ctx.arc(targetX, targetY, 12, 0, Math.PI*2); ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#B0BEC5';
    ctx.beginPath(); ctx.moveTo(targetX, targetY); ctx.lineTo(targetX, targetY + 25); ctx.stroke();
}

        if (i < GAME.currentIndex) {
            bg = COLORS.green; 
        } else if (i === GAME.currentIndex) {
            bg = COLORS.gold; 
            scale = 1 + Math.sin(performance.now() / 100) * 0.1; 
        }
        
        if (i === GAME.currentIndex - 1 && GAME.arrowPopTimer > 0) {
            scale = 1 + (GAME.arrowPopTimer / 100) * 0.25; 
        }

        if (GAME.hazard === 'lag') {
            bg = COLORS.gray; txt = '#E0E0E0';
        }
        
        let actW = sqW * scale;
        let actX = sx + (sqW - actW) / 2;
        let actY = ly + 130 + (sqW - actW) / 2;

        drawShadowRoundRect(actX, actY, actW, actW, 12, bg, null, 0);
        drawText(ARROW_SYM[GAME.sequence[i]], sx + sqW/2, ly + 130 + sqW/2, 45 * scale, txt, 'center', null, 0);
        sx += sqW + sqGap;
    }

    const pPct = Math.max(0, GAME.phaseTimer / GAME.phaseTimerMax);
    drawRoundRect(lx + 60, ly + 215, 680, 20, 10, '#000', COLORS.white, 3);
    drawRoundRect(lx + 64, ly + 219, 672 * pPct, 12, 6, COLORS.red, null);

    if (GAME.hazard) {
        let alpha = 0.85;
        ctx.fillStyle = `rgba(0,0,0,${alpha})`;
        ctx.beginPath();
        ctx.roundRectPolyfill(lx + 20, ly + 20, 760, BOT_H - 120, 10);
        ctx.fill();
    }
}

        title = "SHOO THE CAT AWAY!";
        sub = `Click the cat ${3 - GAME.catClicks} more times!`;
        col = '#FFA000';
        titleY = ly + 45; 
        subY = ly + 85;
    } else if (GAME.hazard === 'battery') {
        title = "BATTERY LOW!";

        titleY = ly + 70;
        subY = ly + 110;

function drawLaptopStore(lx, ly, drawXPTaskbar) {

        drawText(item.desc, ix + 75, iy + 45, 13, '#B0BEC5', 'left', null, 0);
        
        const isMax = item.consumable && GAME.hearts >= GAME.maxHearts;
        const owned = !item.consumable && GAME.upgrades[item.id];
        const btnColor = (owned || isMax) ? COLORS.gray : (GAME.cash >= item.price ? COLORS.green : COLORS.red);
        const btnText = owned ? "EQUIPPED" : (isMax ? "FULL" : `$${item.price}`);

}

function drawHazards(isClipped) {
    if (!GAME.hazard) return;
    const lx = CW/2 - 400;
    const ly = TOP_H + 40;

        if (GAME.hazard === 'ad') {
            const {x, y, w, h} = GAME.adPos;
            drawShadowRoundRect(x, y, w, h, 15, COLORS.uiBg, COLORS.uiDark, 4);
            drawRoundRect(x, y, w, 40, 15, '#1565C0', null);
            drawRect(x, y + 20, w, 20, '#1565C0'); 
            drawText("URGENT MESSAGE", x + 15, y + 20, 18, '#FFF', 'left', null, 0);
            
            drawRoundRect(x + w - 35, y + 5, 30, 30, 8, COLORS.red, null);
            drawText("X", x + w - 20, y + 20, 18, '#FFF', 'center', null, 0);
            
            drawText("TPS REPORTS ARE DUE.", x + w/2, y + 75, 22, '#000', 'center', null, 0);
            drawText("IGNORE SURGERY.", x + w/2, y + 105, 22, '#000', 'center', null, 0);
            drawText("Click red 'X' or press ESC.", x + w/2, y + 145, 16, '#555', 'center', null, 0);
        }
        return; 
    }

    if (GAME.hazard === 'cat') {
        const cx = CW/2; const cy = TOP_H + BOT_H/2;
        drawShadowRoundRect(cx - 150, cy - 120, 300, 240, 120, '#FFA000', '#E65100', 6);
        ctx.fillStyle = '#FFA000'; ctx.strokeStyle = '#E65100'; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(cx - 120, cy - 80); ctx.lineTo(cx - 160, cy - 200); ctx.lineTo(cx - 40, cy - 100); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#FFCDD2'; ctx.beginPath(); ctx.moveTo(cx - 110, cy - 90); ctx.lineTo(cx - 145, cy - 180); ctx.lineTo(cx - 60, cy - 105); ctx.fill();
        ctx.fillStyle = '#FFA000'; ctx.strokeStyle = '#E65100';
        ctx.beginPath(); ctx.moveTo(cx + 120, cy - 80); ctx.lineTo(cx + 160, cy - 200); ctx.lineTo(cx + 40, cy - 100); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#FFCDD2'; ctx.beginPath(); ctx.moveTo(cx + 110, cy - 90); ctx.lineTo(cx + 145, cy - 180); ctx.lineTo(cx + 60, cy - 105); ctx.fill();

        ctx.fillStyle = '#FFF'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.ellipse(cx - 60, cy - 20, 30, 40, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(cx + 60, cy - 20, 30, 40, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.ellipse(cx - 60, cy - 20, 10, 25, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx + 60, cy - 20, 10, 25, 0, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = '#F48FB1';
        ctx.beginPath(); ctx.moveTo(cx - 15, cy + 30); ctx.lineTo(cx + 15, cy + 30); ctx.lineTo(cx, cy + 45); ctx.fill();

        ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(cx, cy + 45); ctx.lineTo(cx, cy + 60); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx - 20, cy + 60, 20, 0, Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 20, cy + 60, 20, 0, Math.PI); ctx.stroke();

        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(cx - 40, cy + 30); ctx.lineTo(cx - 120, cy + 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 40, cy + 40); ctx.lineTo(cx - 130, cy + 40); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 40, cy + 50); ctx.lineTo(cx - 120, cy + 70); ctx.stroke();

        ctx.beginPath(); ctx.moveTo(cx + 40, cy + 30); ctx.lineTo(cx + 120, cy + 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 40, cy + 40); ctx.lineTo(cx + 130, cy + 40); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 40, cy + 50); ctx.lineTo(cx + 120, cy + 70); ctx.stroke();

        drawShadowRoundRect(cx - 120, cy + 80, 80, 80, 40, '#FFA000', '#E65100', 4);
        drawShadowRoundRect(cx + 40, cy + 80, 80, 80, 40, '#FFA000', '#E65100', 4);
    }
    else if (GAME.hazard === 'coffee') {
        ctx.fillStyle = '#4E342E';
        const s = Math.max(0, 300 - (GAME.coffeeWipe / 7));
        ctx.beginPath(); ctx.arc(CW/2, ly + 160, s/2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(CW/2 - s*0.6, ly + 170, s*0.4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(CW/2 + s*0.5, ly + 150, s*0.45, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(CW/2 - s*0.3, ly + 110, s*0.35, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(CW/2 + s*0.3, ly + 210, s*0.35, 0, Math.PI*2); ctx.fill();
    }
    else if (GAME.hazard === 'battery') {
        drawShadowRoundRect(GAME.socketPos.x - 60, GAME.socketPos.y - 60, 120, 120, 15, '#FAFAFA', '#B0BEC5', 4);
        drawRoundRect(GAME.socketPos.x - 25, GAME.socketPos.y - 15, 15, 30, 5, '#212121', null);
        drawRoundRect(GAME.socketPos.x + 10, GAME.socketPos.y - 15, 15, 30, 5, '#212121', null);
        
        ctx.lineWidth = 18;
        ctx.strokeStyle = '#212121';
        ctx.beginPath();
        ctx.moveTo(CW/2, CH); 
        ctx.quadraticCurveTo(CW/2, GAME.plugPos.y + 100, GAME.plugPos.x, GAME.plugPos.y);
        ctx.stroke();
        
        drawShadowRoundRect(GAME.plugPos.x - 30, GAME.plugPos.y - 40, 60, 80, 10, '#424242', '#212121', 4);
        drawRoundRect(GAME.plugPos.x - 15, GAME.plugPos.y - 65, 8, 30, 3, '#E0E0E0', null);
        drawRoundRect(GAME.plugPos.x + 7, GAME.plugPos.y - 65, 8, 30, 3, '#E0E0E0', null);
    }
}

let lastTime = performance.now();

function loop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    ctx.clearRect(0, 0, CW, CH);

    if (GAME.state === 'PLAYING') {
        GAME.anesthesia -= dt;
        GAME.phaseTimer -= dt;
        GAME.hazardTimer += dt;
        if (GAME.routerFlashTimer > 0) GAME.routerFlashTimer -= dt;
        
        if (GAME.armReach > 0) {
            GAME.armReach = Math.max(0, GAME.armReach - dt * 0.2); 
        }
        if (GAME.armGlitchTimer > 0) GAME.armGlitchTimer -= dt;

        if (GAME.inputBuffer.length > 0 && timestamp >= GAME.inputBuffer[0].time) {
            const input = GAME.inputBuffer.shift();
            processArrow(input.code);
        }

        if (GAME.hazard === 'battery') GAME.dimLevel = Math.min(0.95, GAME.dimLevel + (dt * 0.0001)); 

        if (GAME.anesthesia <= 0) triggerResolution('AWAKE');
        if (GAME.phaseTimer <= 0) {
            GAME.hearts--;
            GAME.redFlashTimer = 150;
            GAME.shakeTimer = 300; 
            GAME.perfectStreak = 0;
            GAME.phaseTimer = GAME.phaseTimerMax;
            
            GAME.armGlitchTimer = 800;
            for(let b=0; b<15; b++) {
                GAME.bloodSpills.push({ x: (Math.random() * 300) - 150, y: (Math.random() * 60) - 30, r: Math.random() * 25 + 10 });
            }
            
            if (GAME.hearts <= 0) triggerResolution('MALPRACTICE');
        }
        
        if (GAME.state === 'PLAYING' && !GAME.hazard && GAME.hazardTimer > GAME.hazardNextSpawn) {
            spawnHazard();
            GAME.hazardTimer = 0;
        }
    }
    
    if (GAME.arrowPopTimer > 0) GAME.arrowPopTimer -= dt;
    if (GAME.greenFlashTimer > 0) GAME.greenFlashTimer -= dt;
    
    let shakeX = 0; let shakeY = 0;
    if (GAME.shakeTimer > 0) {
        GAME.shakeTimer -= dt;
        shakeX = (Math.random() - 0.5) * 15 * (GAME.shakeTimer / 300);
        shakeY = (Math.random() - 0.5) * 15 * (GAME.shakeTimer / 300);
    }

    ctx.save();
    if (GAME.shakeTimer > 0) ctx.translate(shakeX, shakeY);

    drawOR(dt);

    // Apply dimming over the hospital area when out of the action!
    if (GAME.state === 'MENU' || GAME.state === 'STORE') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
        ctx.fillRect(0, 0, CW, TOP_H);
    }

    drawRect(0, TOP_H - 8, CW, 16, '#212121', '#000', 4); 
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, TOP_H + 8, CW, 16); 
    drawDesk(dt);

    if (GAME.state === 'HELP') drawHelpModal();

    if (GAME.redFlashTimer > 0) {
        GAME.redFlashTimer -= dt;
        ctx.fillStyle = `rgba(255, 0, 0, ${Math.min(1, GAME.redFlashTimer / 150)})`;
        ctx.fillRect(0, 0, CW, CH);
    }
    
    ctx.restore(); 

    ctx.fillStyle = '#FFF';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(GAME.mouseX, GAME.mouseY);
    ctx.lineTo(GAME.mouseX + 16, GAME.mouseY + 16);
    ctx.lineTo(GAME.mouseX + 7, GAME.mouseY + 18);
    ctx.lineTo(GAME.mouseX, GAME.mouseY + 28);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
