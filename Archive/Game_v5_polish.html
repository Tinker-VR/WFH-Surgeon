const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = true;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

    x: 150, y: 12,
    w: 980, h: 490,
    bezel: 16,
    radius: 14,
    get sx() { return this.x + this.bezel; },
    get sy() { return this.y + this.bezel; },
    get sw() { return this.w - this.bezel * 2; },
    get sh() { return this.h - this.bezel * 2; },
    standW: 120, standH: 14,
    baseW: 180, baseH: 8,
    get orH() { return this.sh * 0.70; },
    get uiY() { return this.sy + this.orH; },
    get uiH() { return this.sh - this.orH; }
};

// ===================== TESTING VARIABLES =====================
// Set to null for normal gameplay, or a string like 'cat','coffee','lag','battery','ad','kbbreak','malware'

const DEBUG_STARTING_CASH = 0;
const DEBUG_STARTING_RANK = 0;
const DEBUG_GOD_MODE = false;
// ===================== END TESTING VARIABLES =================

const STARTING_CASH = DEBUG_STARTING_CASH;
const STARTING_RANK = DEBUG_STARTING_RANK;

// ===================== AUDIO ENGINE =====================
const AudioEngine = {
    ctx: null, enabled: true, lastEkgTime: 0,
    bgmPlaying: false, bgmNodes: [], bgmNextBeat: 0, bgmBPM: 72,
    bgmChordIndex: 0,
    bgmChords: [
        [261.6, 329.6, 392.0],
        [220.0, 277.2, 329.6],
        [246.9, 311.1, 370.0],
        [261.6, 311.1, 392.0],
    ],

    init() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { this.enabled = false; }
    },

    _osc(freq, type, duration, gain = 0.15, delay = 0) {
        if (!this.ctx || !this.enabled) return;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);
        g.gain.setValueAtTime(0, this.ctx.currentTime + delay);
        g.gain.linearRampToValueAtTime(gain, this.ctx.currentTime + delay + 0.015);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + delay + duration);
        o.connect(g).connect(this.ctx.destination);
        o.start(this.ctx.currentTime + delay);
        o.stop(this.ctx.currentTime + delay + duration + 0.05);
    },

    _noise(duration, gain = 0.1, filterFreq = 2000) {
        if (!this.ctx || !this.enabled) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const src = this.ctx.createBufferSource();
        src.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = filterFreq;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(gain, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
        src.connect(filter).connect(g).connect(this.ctx.destination);
        src.start(); src.stop(this.ctx.currentTime + duration + 0.05);
    },

    playEKG()          { this._osc(880, 'sine', 0.08, 0.10); },
    playCorrectKey()   { this._osc(523, 'sine', 0.08, 0.12); this._osc(659, 'sine', 0.06, 0.08, 0.04); },
    playWrongKey()     { this._osc(150, 'sawtooth', 0.2, 0.15); this._osc(120, 'sawtooth', 0.15, 0.1, 0.05); },
    playPhaseComplete(){ this._osc(523, 'sine', 0.12, 0.15); this._osc(659, 'sine', 0.12, 0.15, 0.1); },
    playLevelComplete(){ this._osc(262, 'sine', 0.4, 0.15); this._osc(330, 'sine', 0.4, 0.12, 0.05); this._osc(392, 'sine', 0.5, 0.12, 0.1); },
    playLevelFail()    { this._osc(392, 'sine', 0.15, 0.15); this._osc(311, 'sine', 0.15, 0.12, 0.15); this._osc(262, 'sine', 0.3, 0.1, 0.3); },
    playCoffeeSplash() { this._noise(0.3, 0.12, 1500); },
    playWifiStatic()   { this._noise(0.4, 0.08, 3000); },
    playBatteryWarning(){ this._osc(200, 'square', 0.1, 0.08); this._osc(200, 'square', 0.1, 0.08, 0.2); },
    playClick()        { this._osc(800, 'sine', 0.03, 0.08); },
    playBuy()          { this._osc(600, 'sine', 0.08, 0.1); this._osc(800, 'sine', 0.08, 0.1, 0.08); this._osc(1000, 'sine', 0.1, 0.08, 0.16); },
    playNotification() { this._osc(660, 'sine', 0.05, 0.06); this._osc(880, 'sine', 0.05, 0.06, 0.06); },
    playScrewdriver()  { this._noise(0.15, 0.06, 4000); },
    playVirusZap()     { this._osc(1200, 'square', 0.05, 0.08); this._osc(600, 'square', 0.05, 0.06, 0.05); },
    playKBBreak()      { this._noise(0.2, 0.1, 800); this._osc(100, 'square', 0.15, 0.08); },
    playMalwareAlert() { this._osc(440, 'square', 0.1, 0.1); this._osc(440, 'square', 0.1, 0.1, 0.15); this._osc(440, 'square', 0.1, 0.1, 0.3); },

    playCatMeow() {
        if (!this.ctx || !this.enabled) return;
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(700, this.ctx.currentTime);
        o.frequency.linearRampToValueAtTime(400, this.ctx.currentTime + 0.3);
        o.frequency.linearRampToValueAtTime(500, this.ctx.currentTime + 0.5);
        g.gain.setValueAtTime(0, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 0.02);
        g.gain.setValueAtTime(0.08, this.ctx.currentTime + 0.3);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
        o.connect(g).connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + 0.55);
    },

    updateEKG(timestamp, anesPct, hearts, maxHearts) {
        if (!this.enabled || !this.ctx) return;
        const heartFactor = Math.max(0.3, hearts / maxHearts);
        const interval = (400 + anesPct * 600) * heartFactor;
        if (timestamp - this.lastEkgTime > interval) {
            this.lastEkgTime = timestamp;
            this.playEKG();
        }
    },

    // --- Background Music (ambient hospital lo-fi) ---
    startBGM() {
        if (!this.ctx || this.bgmPlaying) return;
        this.bgmPlaying = true;
        this.bgmNextBeat = this.ctx.currentTime;
        this.bgmChordIndex = 0;
        this._scheduleBGM();
    },

    stopBGM() {
        this.bgmPlaying = false;
        this.bgmNodes.forEach(n => { try { n.stop(); } catch(e){} });
        this.bgmNodes = [];
    },

    _scheduleBGM() {
        if (!this.bgmPlaying || !this.ctx || !this.enabled) return;
        const now = this.ctx.currentTime;
        while (this.bgmNextBeat < now + 2) {
            const t = this.bgmNextBeat;
            const beatLen = 60 / this.bgmBPM;
            const chord = this.bgmChords[this.bgmChordIndex % this.bgmChords.length];

            chord.forEach(freq => {
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                const f = this.ctx.createBiquadFilter();
                o.type = 'triangle';
                o.frequency.setValueAtTime(freq * 0.5, t);
                f.type = 'lowpass'; f.frequency.value = 400;
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(0.025, t + 0.3);
                g.gain.setValueAtTime(0.025, t + beatLen * 2 - 0.3);
                g.gain.linearRampToValueAtTime(0, t + beatLen * 2);
                o.connect(f).connect(g).connect(this.ctx.destination);
                o.start(t); o.stop(t + beatLen * 2 + 0.1);
                this.bgmNodes.push(o);
            });

            const bass = this.ctx.createOscillator();
            const bg2 = this.ctx.createGain();
            bass.type = 'sine';
            bass.frequency.setValueAtTime(chord[0] * 0.25, t);
            bg2.gain.setValueAtTime(0, t);
            bg2.gain.linearRampToValueAtTime(0.04, t + 0.1);
            bg2.gain.linearRampToValueAtTime(0.02, t + beatLen - 0.1);
            bg2.gain.linearRampToValueAtTime(0, t + beatLen);
            bass.connect(bg2).connect(this.ctx.destination);
            bass.start(t); bass.stop(t + beatLen + 0.1);
            this.bgmNodes.push(bass);

            const tickLen = 0.04;
            const tickBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * tickLen, this.ctx.sampleRate);
            const tickData = tickBuf.getChannelData(0);
            for (let j = 0; j < tickData.length; j++) tickData[j] = (Math.random()*2-1) * Math.max(0, 1 - j/tickData.length);
            const tickSrc = this.ctx.createBufferSource();
            tickSrc.buffer = tickBuf;
            const tickG = this.ctx.createGain();
            const tickF = this.ctx.createBiquadFilter();
            tickF.type = 'highpass'; tickF.frequency.value = 6000;
            tickG.gain.setValueAtTime(0.015, t);
            tickSrc.connect(tickF).connect(tickG).connect(this.ctx.destination);
            tickSrc.start(t); tickSrc.stop(t + tickLen + 0.01);
            this.bgmNodes.push(tickSrc);

            this.bgmNextBeat += beatLen;
            if (Math.round((this.bgmNextBeat - now) / beatLen) % 2 === 0) this.bgmChordIndex++;
        }

        if (this.bgmNodes.length > 50) this.bgmNodes = this.bgmNodes.slice(-30);
        if (this.bgmPlaying) setTimeout(() => this._scheduleBGM(), 500);
    }
};

// ===================== GLOBAL STATE =====================
const GAME = {
    state: 'MENU',
    storeReturnState: 'MENU',
    showQuitConfirm: false,
    pendingStart: false,
    cash: STARTING_CASH,

    }
};

function addNotification(text, icon = '', duration = 2000) {
    GAME.notifications.push({ text, icon, timer: duration, maxTimer: duration });
    AudioEngine.playNotification();
}

// Keyboard screw positions (based on keyboard layout)
function getKBScrewPositions() {
    const kbW = 480, kbH = 120;
    const deskMidZone = CW - 265;
    const kbCenterX = (175 + deskMidZone) / 2;
    const kx = kbCenterX - kbW/2, ky = DESK_Y + 38;
    return [
        {x: kx + 18, y: ky + 18},
        {x: kx + kbW - 18, y: ky + 18},
        {x: kx + 18, y: ky + kbH - 18},
        {x: kx + kbW - 18, y: ky + kbH - 18}
    ];
}

// ===================== INPUT =====================
function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    GAME.mouseX = (e.clientX - rect.left) * (CW / rect.width);
    GAME.mouseY = (e.clientY - rect.top) * (CH / rect.height);
}

window.addEventListener('mousemove', (e) => {
    updateMousePos(e);
    GAME.mouseIdleTimer = 0;
    if (GAME.paused) return;
    if (GAME.hazard === 'battery' && GAME.batteryDrag) {
        GAME.plugPos.x = GAME.mouseX;
        GAME.plugPos.y = GAME.mouseY;
    }
    if (GAME.hazard === 'coffee') {
        const M = MONITOR;
        const splatX = M.sx + M.sw/2, splatY = M.sy + M.sh/2;
        if (Math.hypot(GAME.mouseX - splatX, GAME.mouseY - splatY) < M.sw*0.45) {
            GAME.coffeeWipe += Math.hypot(GAME.mouseX - GAME.lastMouseX, GAME.mouseY - GAME.lastMouseY);
            if (GAME.coffeeWipe > 3000) clearHazard();
        }
    }
    GAME.lastMouseX = GAME.mouseX;
    GAME.lastMouseY = GAME.mouseY;
});

window.addEventListener('mouseup', (e) => {
    updateMousePos(e);
    if (GAME.hazard === 'battery' && GAME.batteryDrag) {
        GAME.batteryDrag = false;
        if (Math.hypot(GAME.plugPos.x - GAME.socketPos.x, GAME.plugPos.y - GAME.socketPos.y) < 100) clearHazard();
    }
});

window.addEventListener('mousedown', (e) => {
    updateMousePos(e);
    if (!AudioEngine.ctx) AudioEngine.init();

    // Pause button — only during PLAYING state (check BEFORE paused block)
    const pb = GAME.pauseBtn;
    if (GAME.state === 'PLAYING' && isHover(pb.x, pb.y, pb.w, pb.h)) {
        AudioEngine.playClick();
        GAME.paused = !GAME.paused;
        return;
    }
    // Resume button on pause overlay (big center button)
    if (GAME.state === 'PLAYING' && GAME.paused && isHover(CW/2 - 110, CH/2 + 100, 220, 55)) {
        AudioEngine.playClick();
        GAME.paused = false;
        return;
    }
    // Block ALL other clicks while paused
    if (GAME.paused) return;

    const mb = GAME.muteBtn;
    if (isHover(mb.x, mb.y, mb.w, mb.h)) {
        AudioEngine.enabled = !AudioEngine.enabled;
        if (!AudioEngine.enabled) AudioEngine.stopBGM();
        else if (GAME.state === 'PLAYING') AudioEngine.startBGM();
        return;
    }

    const M = MONITOR;
    const sx = M.sx, sy = M.sy, sw = M.sw, sh = M.sh;

    if (GAME.state === 'MENU') {
        const btnW = 220, btnH = 58, btnGap = 30;
        const total = btnW * 3 + btnGap * 2;
        const bx0 = sx + (sw - total) / 2;
        const cy = M.uiY + M.uiH/2;
        const by = cy + 20;
        if (isHover(bx0, by, btnW, btnH)) {
            AudioEngine.playClick(); GAME.rank = STARTING_RANK; GAME.hearts = 3;
            GAME.pendingStart = true; GAME.state = 'HELP'; GAME.helpPage = 0;
        }
        if (isHover(bx0 + btnW + btnGap, by, btnW, btnH)) { AudioEngine.playClick(); GAME.storeReturnState = 'MENU'; GAME.state = 'STORE'; }
        if (isHover(bx0 + (btnW + btnGap)*2, by, btnW, btnH)) { AudioEngine.playClick(); GAME.state = 'HELP'; GAME.helpPage = 0; }
        return;
    }

    if (GAME.state === 'HELP') {
        const mx = CW/2 - 360, my = CH/2 - 280, mw = 720, mh = 560;
        if (isHover(mx + mw - 55, my + 12, 42, 42)) {
            AudioEngine.playClick();
            if (GAME.pendingStart) { GAME.pendingStart = false; startOperation(); } else GAME.state = 'MENU';
            return;
        }
        if (GAME.helpPage > 0 && isHover(mx + 25, my + mh - 65, 110, 44)) { AudioEngine.playClick(); GAME.helpPage--; return; }
        if (GAME.helpPage < 3 && isHover(mx + mw - 135, my + mh - 65, 110, 44)) { AudioEngine.playClick(); GAME.helpPage++; return; }
        if (isHover(CW/2 - 130, my + mh - 70, 260, 50)) {
            AudioEngine.playClick();
            if (GAME.pendingStart) { GAME.pendingStart = false; startOperation(); } else GAME.state = 'MENU';
        }
        return;
    }

    if (GAME.state === 'STORE') {
        // BACK button
        if (isHover(sx + 20, sy + 14, 110, 38)) {
            AudioEngine.playClick();
            GAME.state = GAME.storeReturnState || 'MENU';
        }
        // Single-page grid — all items
        const cols = 4;
        const cardW = Math.floor((sw - 30 - (cols-1)*10) / cols);
        STORE_ITEMS.forEach((item, i) => {
            const col = i % cols, row = Math.floor(i / cols);
            const ix = sx + 15 + col * (cardW + 10);
            const iy = sy + 68 + row * 118;
            const bx2 = ix + cardW/2 - 50, by2 = iy + 78;
            if (isHover(bx2, by2, 100, 26)) {
                if (item.consumable) {
                    if (GAME.cash >= item.price && GAME.hearts < GAME.maxHearts) {
                        GAME.cash -= item.price; GAME.hearts++;
                        AudioEngine.playBuy(); addNotification('Heart restored!', '❤️');
                    }
                } else {
                    if (GAME.upgrades[item.id]) return;
                    if (GAME.cash >= item.price) {
                        GAME.cash -= item.price; GAME.upgrades[item.id] = true;
                        AudioEngine.playBuy(); addNotification(`${item.title} equipped!`, item.icon);
                        if (item.id === 'lawyer') { GAME.maxHearts = 4; GAME.hearts++; }
                    }
                }
            }
        });
        return;
    }

    if (GAME.state === 'RESOLUTION') {
        if (GAME.showQuitConfirm) {
            const qx = sx + sw/2 - 210, qy = sy + sh/2 - 75;
            if (isHover(qx + 30, qy + 103, 170, 52)) {
                AudioEngine.playClick();
                GAME.cash = STARTING_CASH; GAME.highestRank = STARTING_RANK; GAME.rank = STARTING_RANK;
                GAME.hearts = 3; GAME.maxHearts = 3;
                GAME.upgrades = { ...DEFAULT_UPGRADES };
                GAME.showQuitConfirm = false; GAME.state = 'MENU'; resetHospitalAnimations();
            }
            if (isHover(qx + 220, qy + 103, 170, 52)) { AudioEngine.playClick(); GAME.showQuitConfirm = false; }
            return;
        }
        const btnW = 220, btnH = 55, gap = 20;
        const total = btnW*3 + gap*2;
        const bx0 = sx + (sw - total)/2;
        const by = sy + sh - 80;

        if (GAME.lastResult === 'WIN') {
            // NEXT OP — start directly (no shop detour)
            if (isHover(bx0, by, btnW, btnH)) { AudioEngine.playClick(); startOperation(); }
            if (isHover(bx0+btnW+gap, by, btnW, btnH)) { AudioEngine.playClick(); GAME.storeReturnState = 'RESOLUTION'; GAME.state = 'STORE'; }
            if (isHover(bx0+(btnW+gap)*2, by, btnW, btnH)) { AudioEngine.playClick(); GAME.showQuitConfirm = true; }
        } else {
            // NO FREE RETRY — must afford the cost
            const retryCost = (GAME.rank+1)*300;
            if (isHover(bx0, by, btnW, btnH) && GAME.cash >= retryCost) {
                AudioEngine.playClick();
                GAME.cash -= retryCost;
                GAME.maxHearts = GAME.upgrades.lawyer ? 4 : 3;
                GAME.hearts = GAME.maxHearts;
                startOperation();
            }
            if (isHover(bx0+btnW+gap, by, btnW, btnH)) { AudioEngine.playClick(); GAME.storeReturnState = 'RESOLUTION'; GAME.state = 'STORE'; }
            if (isHover(bx0+(btnW+gap)*2, by, btnW, btnH)) { AudioEngine.playClick(); GAME.showQuitConfirm = true; }
        }
        return;
    }

    if (GAME.state === 'PLAYING') {
        if (GAME.hazard === 'cat') {
            const ccx = CW/2, ccy = CH/2 - 20;
            if (isHover(ccx - 220, ccy - 220, 440, 440)) {
                GAME.catClicks++;
                AudioEngine.playCatMeow();
                // Click feedback: flash + star burst
                GAME.catFlashTimer = 300;
                for (let s = 0; s < 8; s++) {
                    const angle = (s / 8) * Math.PI * 2;
                    GAME.catStars.push({
                        x: GAME.mouseX, y: GAME.mouseY,
                        vx: Math.cos(angle) * (150 + Math.random()*100),
                        vy: Math.sin(angle) * (150 + Math.random()*100),
                        life: 500, maxLife: 500, size: 12 + Math.random()*8
                    });
                }
                if (GAME.catClicks >= 3) clearHazard();
            }
        }
        else if (GAME.hazard === 'ad') {
            // Real close button (bigger hitbox)
            if (isHover(GAME.adPos.x + GAME.adPos.w - 48, GAME.adPos.y + 8, 40, 40)) clearHazard();
        }
        else if (GAME.hazard === 'battery') {
            if (Math.hypot(GAME.mouseX - GAME.plugPos.x, GAME.mouseY - GAME.plugPos.y) < 90) GAME.batteryDrag = true;
        }
        else if (GAME.hazard === 'lag') {
            if (isHover(10, DESK_Y + 5, 200, 65)) {
                GAME.routerClicks++; GAME.routerFlashTimer = 150; GAME.routerShakeTimer = 200; AudioEngine.playWifiStatic();
                if (GAME.routerClicks >= 3) clearHazard();
            }
        }
        else if (GAME.hazard === 'kbbreak') {
            if (!GAME.hasScrewdriver) {
                if (Math.hypot(GAME.mouseX - GAME.screwdriverPos.x, GAME.mouseY - GAME.screwdriverPos.y) < 55) {
                    GAME.hasScrewdriver = true;
                    AudioEngine.playClick();
                }
            } else {
                const screws = getKBScrewPositions();
                screws.forEach((sp, idx) => {
                    if (!GAME.kbScrews[idx] && Math.hypot(GAME.mouseX - sp.x, GAME.mouseY - sp.y) < 28) {
                        GAME.kbScrews[idx] = true;
                        AudioEngine.playScrewdriver();
                        if (GAME.kbScrews.every(s => s)) clearHazard();
                    }
                });
            }
        }
        else if (GAME.hazard === 'malware') {
            GAME.virusIcons.forEach(v => {
                if (v.alive && Math.hypot(GAME.mouseX - v.x, GAME.mouseY - v.y) < 45) {
                    v.alive = false;
                    GAME.virusesClicked++;
                    AudioEngine.playVirusZap();
                    if (GAME.virusesClicked >= 5) clearHazard();
                }
            });
        }
    }
});

window.addEventListener('keydown', (e) => {
    if (GAME.paused) return;
    if (GAME.state === 'PLAYING') {
        if (GAME.hazard === 'ad' && e.code === 'Escape') { clearHazard(); return; }
        if (ARROWS.includes(e.code)) {
            e.preventDefault();
            if (['cat', 'battery', 'ad', 'coffee', 'kbbreak', 'malware'].includes(GAME.hazard)) return;
            if (GAME.hazard === 'lag') GAME.inputBuffer.push({ code: e.code, time: performance.now() + 800 });
            else processArrow(e.code);
        }
    }
});

function processArrow(code) {
    GAME.kbShakeTimer = 180;
    if (code === GAME.sequence[GAME.currentIndex]) {
        GAME.currentIndex++;
        GAME.arrowPopTimer = 100;
        GAME.armReach = Math.min(300, GAME.armReach + 80);
        AudioEngine.playCorrectKey();
        if (GAME.upgrades.keyboard) GAME.anesthesia = Math.min(GAME.anesthesiaMax, GAME.anesthesia + 200);
        if (GAME.currentIndex >= GAME.sequence.length) { GAME.armReach = 300; chunkComplete(); }
    } else {
        if (!DEBUG_GOD_MODE) GAME.hearts--;
        GAME.redFlashTimer = 150; GAME.shakeTimer = 300; GAME.perfectStreak = 0;
        AudioEngine.playWrongKey(); GAME.armGlitchTimer = 800;
        for (let b = 0; b < 20; b++) GAME.bloodSpills.push({ x: (Math.random()*300)-150, y: (Math.random()*60)-30, r: Math.random()*18+6 });
        if (!DEBUG_GOD_MODE && GAME.hearts <= 0) triggerResolution('MALPRACTICE');
    }
}

// ===================== UTILITIES =====================
function isHover(x, y, w, h) { return GAME.mouseX >= x && GAME.mouseX <= x+w && GAME.mouseY >= y && GAME.mouseY <= y+h; }

function drawRect(x, y, w, h, fill, stroke, sw2 = 4) {
    if (fill) { ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); }
    if (stroke) { ctx.lineWidth = sw2; ctx.strokeStyle = stroke; ctx.strokeRect(x, y, w, h); }
}

if (!ctx.roundRectPolyfill) {
    ctx.roundRectPolyfill = function(x, y, w, h, r) {
        if (w < 2*r) r = w/2; if (h < 2*r) r = h/2;
        this.beginPath(); this.moveTo(x+r, y);
        this.arcTo(x+w, y, x+w, y+h, r); this.arcTo(x+w, y+h, x, y+h, r);
        this.arcTo(x, y+h, x, y, r); this.arcTo(x, y, x+w, y, r);
        this.closePath(); return this;
    }
}

function drawRoundRect(x, y, w, h, r, fill, stroke, sw2 = 4) {
    ctx.roundRectPolyfill(x, y, w, h, r);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.lineWidth = sw2; ctx.strokeStyle = stroke; ctx.stroke(); }
}

function drawShadowRoundRect(x, y, w, h, r, fill, stroke, sw2 = 4) {
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4;
    drawRoundRect(x, y, w, h, r, fill, stroke, sw2);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
}

function drawText(text, x, y, size, fill, align = 'left', shadowCol = null, shadowBlur = 0, weight = 'bold') {
    ctx.font = `${weight} ${size}px 'Segoe UI', Tahoma, sans-serif`;
    ctx.textAlign = align; ctx.textBaseline = 'middle';
    if (shadowCol) { ctx.shadowColor = shadowCol; ctx.shadowBlur = shadowBlur; ctx.shadowOffsetY = 2; }
    ctx.fillStyle = fill; ctx.fillText(text, x, y);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
}

function drawButton(text, x, y, w, h, color, fontSize = 20, pulse = false) {
    const hover = isHover(x, y, w, h);
    const yo = hover ? 2 : 0;
    if (!hover) { ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4; }
    drawRoundRect(x, y + yo, w, h, h/2, hover ? '#FFF' : color, null, 0);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    let sc = 1; if (pulse && !hover) sc = 1 + Math.sin(performance.now()/200)*0.03;
    ctx.save(); ctx.translate(x+w/2, y+h/2+yo); ctx.scale(sc, sc);
    drawText(text, 0, 0, fontSize, hover ? '#000' : '#FFF', 'center');
    ctx.restore();
}

function getRankName(ri) {
    const t = ['Intern','Resident','Attending','Chief','Surgeon General'];
    return `${t[Math.floor(ri/3)] || 'God of Surgery'} ${['I','II','III'][ri%3] || 'III'}`;
}

// ===================== LOGIC =====================
function resetHospitalAnimations() {
    GAME.redFlashTimer=0; GAME.greenFlashTimer=0; GAME.shakeTimer=0; GAME.arrowPopTimer=0;
    GAME.bloodSpills=[]; GAME.armGlitchTimer=0; GAME.armReach=0; GAME.kbShakeTimer=0;
    GAME.catFlashTimer=0; GAME.catStars=[];
}

function startOperation() {
    GAME.hazard=null; GAME.dimLevel=0; GAME.catClicks=0; GAME.coffeeWipe=0;
    GAME.routerClicks=0; GAME.inputBuffer=[]; GAME.batteryDrag=false;
    GAME.kbScrews=[false,false,false,false]; GAME.hasScrewdriver=false;
    GAME.virusIcons=[]; GAME.virusesClicked=0; GAME.routerShakeTimer=0;
    GAME.catFlashTimer=0; GAME.catStars=[]; GAME.mouseIdleTimer=0;
    resetHospitalAnimations();
    GAME.maxHearts = GAME.upgrades.lawyer ? 4 : 3;
    if (GAME.hearts > GAME.maxHearts) GAME.hearts = GAME.maxHearts;
    GAME.anesthesiaMax = (50 - GAME.rank*1.1)*1000;
    if (GAME.upgrades.energy) GAME.anesthesiaMax *= 1.2;
    GAME.anesthesia = GAME.anesthesiaMax;
    GAME.phaseTimerMax = 9500 - GAME.rank*250;
    if (GAME.upgrades.keyboard) GAME.phaseTimerMax *= 1.2;
    GAME.phasesNeeded = 3 + Math.floor(GAME.rank*0.5);
    GAME.phasesCompleted = 0; GAME.perfectStreak = 0;
    GAME.flavorText = `${PROCEDURES[Math.floor(Math.random()*PROCEDURES.length)]} | ${PATIENTS[Math.floor(Math.random()*PATIENTS.length)]}`;
    GAME.hazardTimer = 0;
    const hfMin = 8000 - GAME.rank*350, hfMax = 12000 - GAME.rank*450;
    GAME.hazardNextSpawn = hfMin + Math.random()*(hfMax - hfMin);
    GAME.routerFlashTimer = 0;
    generateSequence(5 + Math.floor(GAME.rank * 0.45));
    GAME.state = 'PLAYING';
    AudioEngine.startBGM();
}

function generateSequence(len) {
    GAME.sequence = [];
    for (let i = 0; i < len; i++) GAME.sequence.push(ARROWS[Math.floor(Math.random()*4)]);
    GAME.currentIndex = 0; GAME.phaseTimer = GAME.phaseTimerMax;
}

function chunkComplete() {
    GAME.phasesCompleted++; GAME.perfectStreak++; GAME.greenFlashTimer = 200;
    AudioEngine.playPhaseComplete();
    addNotification(`Sequence ${GAME.phasesCompleted}/${GAME.phasesNeeded}`, '✅', 1500);
    if (GAME.perfectStreak >= 3 && GAME.hearts < GAME.maxHearts) {
        GAME.hearts++; GAME.perfectStreak = 0;
        addNotification('+1 Heart! (3x Perfect)', '❤️', 2000);
    }
    if (GAME.phasesCompleted >= GAME.phasesNeeded) triggerResolution('WIN');
    else generateSequence(5 + Math.floor(GAME.rank*0.45));
}

function spawnHazard() {
    if (DEBUG_FORCE_HAZARD) {
        GAME.hazard = DEBUG_FORCE_HAZARD;
    } else {
        let pool = [];
        if (!GAME.upgrades.adBlock) pool.push('ad');
        if (!GAME.upgrades.powerBank) pool.push('battery');
        if (!GAME.upgrades.ethernet) pool.push('lag');
        if (!GAME.upgrades.mugLid) pool.push('coffee');
        if (!GAME.upgrades.treats) pool.push('cat');
        if (!GAME.upgrades.wrench) pool.push('kbbreak');
        if (!GAME.upgrades.antivirus) pool.push('malware');
        if (!pool.length) return;
        GAME.hazard = pool[Math.floor(Math.random()*pool.length)];
    }
    GAME.coffeeWipe = 0; GAME.routerClicks = 0;
    if (GAME.hazard === 'cat') { GAME.catClicks = 0; GAME.catFlashTimer = 0; GAME.catStars = []; AudioEngine.playCatMeow(); }
    if (GAME.hazard === 'ad') {
        const M = MONITOR;
        GAME.adPos.w = M.sw - 40;
        GAME.adPos.h = M.sh - 30;
        GAME.adPos.x = M.sx + 20;
        GAME.adPos.y = M.sy + 15;
        GAME.adIndex = Math.floor(Math.random() * CHEEKY_ADS.length);
    }
    if (GAME.hazard === 'battery') {
        GAME.dimLevel=0; GAME.batteryDrag=false;
        GAME.plugPos = {x: CW/2 - 100, y: DESK_Y + 90};
        GAME.socketPos = {x: CW/2 + 200, y: DESK_Y + 90};
        AudioEngine.playBatteryWarning();
    }
    if (GAME.hazard === 'lag') { AudioEngine.playWifiStatic(); GAME.routerShakeTimer = 999999; }
    if (GAME.hazard === 'coffee') AudioEngine.playCoffeeSplash();
    if (GAME.hazard === 'kbbreak') {
        GAME.kbScrews = [false, false, false, false];
        GAME.hasScrewdriver = false;
        GAME.screwdriverPos = { x: 250, y: DESK_Y + 120 };
        AudioEngine.playKBBreak();
    }
    if (GAME.hazard === 'malware') {
        GAME.virusIcons = [];
        GAME.virusesClicked = 0;
        const M = MONITOR;
        for (let i = 0; i < 5; i++) {
            GAME.virusIcons.push({
                x: M.sx + 60 + Math.random() * (M.sw - 120),
                y: M.sy + 60 + Math.random() * (M.sh - 120),
                alive: true
            });
        }
        AudioEngine.playMalwareAlert();
    }
}

function clearHazard() {
    GAME.hazard = null; GAME.coffeeWipe = 0; GAME.dimLevel = 0;
    GAME.routerShakeTimer = 0;
    GAME.kbScrews = [false,false,false,false]; GAME.hasScrewdriver = false;
    GAME.virusIcons = []; GAME.virusesClicked = 0;
    GAME.catFlashTimer = 0; GAME.catStars = [];
    const hfMin = 8000 - GAME.rank*350, hfMax = 12000 - GAME.rank*450;
    GAME.hazardNextSpawn = hfMin + Math.random()*(hfMax - hfMin);
}

function triggerResolution(result) {
    GAME.state = 'RESOLUTION'; GAME.lastResult = result;
    GAME.hazard = null; GAME.dimLevel = 0; GAME.inputBuffer = []; GAME.paused = false;
    GAME.routerShakeTimer = 0; GAME.kbShakeTimer = 0;
    GAME.catFlashTimer = 0; GAME.catStars = [];
    AudioEngine.stopBGM();
    if (result === 'WIN') {
        if (GAME.rank < 14) GAME.rank++;
        const base = 200 + GAME.rank*100;
        const hb = GAME.hearts*(50 + GAME.rank*10);
        const tb = Math.floor((GAME.anesthesia/1000)*10);
        GAME.payout = base + hb + tb; GAME.cash += GAME.payout;
        AudioEngine.playLevelComplete();
        addNotification('Operation Success!', '🎉', 2500);
        if (GAME.rank > GAME.highestRank) { GAME.highestRank = GAME.rank; addNotification('Promoted to ' + getRankName(GAME.rank) + '!', '⭐', 3000); }
    } else { GAME.payout = 0; AudioEngine.playLevelFail(); }
    GAME.upgrades = { ...DEFAULT_UPGRADES };
}

// ===================== RENDERERS =====================

function drawBackground() {
    drawRect(0, 0, CW, CH, COLORS.wallBg);
    ctx.strokeStyle = COLORS.wallAccent; ctx.lineWidth = 1;
    for (let i = 0; i < CW; i += 100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, DESK_Y); ctx.stroke(); }
    let dg = ctx.createLinearGradient(0, DESK_Y, 0, CH);
    dg.addColorStop(0, COLORS.deskSurface); dg.addColorStop(0.08, COLORS.deskEdge); dg.addColorStop(1, COLORS.deskShadow);
    ctx.fillStyle = dg; ctx.fillRect(0, DESK_Y, CW, CH - DESK_Y);
    drawRect(0, DESK_Y, CW, 4, '#D4C4A8');
    let ds = ctx.createLinearGradient(0, DESK_Y, 0, DESK_Y + 20);
    ds.addColorStop(0, 'rgba(0,0,0,0.15)'); ds.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ds; ctx.fillRect(0, DESK_Y, CW, 20);
}

function drawMonitorFrame() {
    const M = MONITOR;
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 30; ctx.shadowOffsetY = 10;
    drawRoundRect(M.x, M.y, M.w, M.h, M.radius, COLORS.monitorBezel, null);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    drawRoundRect(M.x+3, M.y+3, M.w-6, M.h-6, M.radius-2, '#252525', null);
    drawRoundRect(M.sx, M.sy, M.sw, M.sh, 4, COLORS.monitorScreen, null);
    drawRect(M.x+M.w/2 - M.standW/2, M.y+M.h, M.standW, M.standH, '#2D2D2D');
    drawRoundRect(M.x+M.w/2 - M.baseW/2, M.y+M.h+M.standH, M.baseW, M.baseH, 3, '#333', '#222', 2);
    ctx.fillStyle = GAME.state === 'PLAYING' ? '#00E676' : '#4CAF50';
    ctx.beginPath(); ctx.arc(M.x+M.w/2, M.y+M.h-8, 4, 0, Math.PI*2); ctx.fill();
    drawText('LG (Legally Gray)', M.x+M.w/2, M.y+M.h-8, 10, '#444', 'center', null, 0, 'normal');
}

function drawMonitorEffects() {
    const M = MONITOR;
    // Scanlines
    ctx.fillStyle = 'rgba(0,0,0,0.025)';
    for (let i = M.sy; i < M.sy+M.sh; i += 3) ctx.fillRect(M.sx, i, M.sw, 1);
    // CRT scrolling bar
    ctx.save();
    ctx.beginPath(); ctx.rect(M.sx, M.sy, M.sw, M.sh); ctx.clip();
    const crtCycle = 4000;
    const crtProgress = (performance.now() % crtCycle) / crtCycle;
    const crtBarY = M.sy + crtProgress * (M.sh + 35) - 35;
    const crtBarGrad = ctx.createLinearGradient(M.sx, crtBarY, M.sx, crtBarY + 35);
    crtBarGrad.addColorStop(0, 'rgba(255,255,255,0)');
    crtBarGrad.addColorStop(0.5, 'rgba(255,255,255,0.08)');
    crtBarGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = crtBarGrad;
    ctx.fillRect(M.sx, crtBarY, M.sw, 35);
    ctx.restore();
    // Vignette
    const vg = ctx.createRadialGradient(M.sx+M.sw/2, M.sy+M.sh/2, M.sw*0.4, M.sx+M.sw/2, M.sy+M.sh/2, M.sw*0.65);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.12)');
    ctx.fillStyle = vg; ctx.fillRect(M.sx, M.sy, M.sw, M.sh);
}

function drawORScene() {
    const M = MONITOR;
    ctx.save();
    ctx.beginPath(); ctx.roundRectPolyfill(M.sx, M.sy, M.sw, M.orH, 4); ctx.clip();

    const orBot = M.sy + M.orH;
    // Wall with subtle gradient
    const wallGrad = ctx.createLinearGradient(M.sx, M.sy, M.sx, orBot - 70);
    wallGrad.addColorStop(0, '#D5EDE8'); wallGrad.addColorStop(1, COLORS.orWall);
    ctx.fillStyle = wallGrad; ctx.fillRect(M.sx, M.sy, M.sw, M.orH);
    // Wall tile lines
    ctx.strokeStyle = '#C8DDD8'; ctx.lineWidth = 1;
    for (let i = M.sx; i < M.sx+M.sw; i += 60) { ctx.beginPath(); ctx.moveTo(i, M.sy); ctx.lineTo(i, orBot-70); ctx.stroke(); }
    for (let j = M.sy; j < orBot-70; j += 40) { ctx.beginPath(); ctx.moveTo(M.sx, j); ctx.lineTo(M.sx+M.sw, j); ctx.stroke(); }
    // Baseboard
    drawRect(M.sx, orBot-73, M.sw, 6, '#90A4AE');
    // Floor with tile pattern
    const floorGrad = ctx.createLinearGradient(M.sx, orBot-67, M.sx, orBot);
    floorGrad.addColorStop(0, '#A8CCC4'); floorGrad.addColorStop(1, COLORS.orFloor);
    ctx.fillStyle = floorGrad; ctx.fillRect(M.sx, orBot - 67, M.sw, 67);
    ctx.strokeStyle = '#9CC0B6'; ctx.lineWidth = 1;
    for (let i = M.sx; i < M.sx+M.sw; i += 50) {
        ctx.beginPath(); ctx.moveTo(i, orBot-67); ctx.lineTo(i-20, orBot); ctx.stroke();
    }

    const lx = M.sx + M.sw/2;

    // === GLASS CABINET (left wall) — BIGGER ===
    const cabX = M.sx + 8, cabY = M.sy + 12, cabW = 85, cabH = M.orH * 0.55;
    drawRoundRect(cabX, cabY, cabW, cabH, 5, '#CFD8DC', '#90A4AE', 2);
    ctx.fillStyle = 'rgba(200,220,230,0.25)';
    ctx.fillRect(cabX+4, cabY+4, cabW-8, cabH-8);
    for (let s = 1; s < 4; s++) {
        const shelfY = cabY + s * (cabH/4);
        ctx.strokeStyle = '#B0BEC5'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cabX+4, shelfY); ctx.lineTo(cabX+cabW-4, shelfY); ctx.stroke();
        // Bigger bottles
        ctx.fillStyle = ['#EF5350','#42A5F5','#66BB6A','#FFA726'][s-1];
        ctx.fillRect(cabX+10, shelfY-18, 10, 18);
        ctx.fillStyle = '#78909C';
        ctx.fillRect(cabX+26, shelfY-14, 8, 14);
        ctx.fillStyle = '#AB47BC';
        ctx.fillRect(cabX+42, shelfY-20, 10, 20);
        ctx.fillStyle = '#4FC3F7';
        ctx.fillRect(cabX+58, shelfY-12, 8, 12);
    }
    // Cabinet handle
    ctx.strokeStyle = '#78909C'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cabX+cabW-12, cabY+cabH/2-12); ctx.lineTo(cabX+cabW-12, cabY+cabH/2+12); ctx.stroke();

    // === HAND SANITIZER DISPENSER (left wall) ===
    const sanX = M.sx + 100, sanY = M.sy + 18;
    drawRoundRect(sanX, sanY, 26, 40, 5, '#E8F5E9', '#A5D6A7', 1);
    drawRoundRect(sanX + 7, sanY - 10, 12, 14, 4, '#C8E6C9', '#81C784', 1);
    ctx.strokeStyle = '#A5D6A7'; ctx.lineWidth = 2;

    // Instruments
    ctx.fillStyle = '#78909C';
    ctx.fillRect(trayX - 24, trayY - 8, 4, 8);
    ctx.fillRect(trayX - 12, trayY - 10, 4, 10);

    ctx.fillRect(trayX + 18, trayY - 9, 4, 9);
    ctx.fillRect(trayX + 30, trayY - 6, 4, 6);

    ctx.fillStyle = 'rgba(0,0,0,0.12)';

    lg.addColorStop(0, 'rgba(255,255,240,0.18)'); lg.addColorStop(1, 'rgba(255,255,255,0)');

    ctx.beginPath(); ctx.moveTo(lampX-65, M.sy+22); ctx.lineTo(lampX+65, M.sy+22); ctx.lineTo(lampX+150, orBot); ctx.lineTo(lampX-150, orBot); ctx.fill();

    // Heart monitor
    const hmx = M.sx+80, hmy = M.sy+15;
    drawShadowRoundRect(hmx, hmy, 95, 72, 10, '#37474F', '#263238', 2);
    drawRoundRect(hmx+6, hmy+6, 83, 38, 5, '#000');
    ctx.strokeStyle = '#00E676'; ctx.lineWidth = 2;
    let ekg = (performance.now()/12) % 83;
    ctx.beginPath();
    ctx.moveTo(hmx+6, hmy+26); ctx.lineTo(hmx+6+ekg/2, hmy+26);
    ctx.lineTo(hmx+6+ekg/2+5, hmy+12); ctx.lineTo(hmx+6+ekg/2+10, hmy+38);
    ctx.lineTo(hmx+6+ekg/2+15, hmy+26); ctx.lineTo(hmx+89, hmy+26);
    ctx.stroke();
    ctx.fillStyle = (Math.floor(performance.now()/300)%2===0) ? '#00E676' : '#1B5E20';
    ctx.beginPath(); ctx.arc(hmx+78, hmy+56, 5, 0, Math.PI*2); ctx.fill();
    drawText('HR', hmx+12, hmy+56, 10, '#4CAF50', 'left', null, 0, 'normal');
    drawText('SpO2', hmx+12, hmy+66, 10, '#42A5F5', 'left', null, 0, 'normal');
    drawText('98', hmx+70, hmy+66, 10, '#42A5F5', 'right', null, 0, 'normal');

    // === EKG WIRE from patient to monitor ===
    ctx.strokeStyle = '#66BB6A'; ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(hmx + 47, hmy + 44);
    ctx.quadraticCurveTo(lx - 80, M.sy + M.orH * 0.35, lx - 30, orBot - 55);
    ctx.stroke();
    ctx.setLineDash([]);

    // Patient — BIGGER, higher position
    drawPatient(lx, orBot - 45);

    // Blood
    ctx.fillStyle = 'rgba(211,47,47,0.8)';
    GAME.bloodSpills.forEach(s => { ctx.beginPath(); ctx.arc(lx+s.x*0.8, orBot-45+s.y, s.r*0.8, 0, Math.PI*2); ctx.fill(); });

    // Arms — more movement with increased sway
    let speed = GAME.state==='PLAYING' ? 400 : 2000;
    let sway = Math.sin(performance.now()/speed)*20 + Math.sin(performance.now()/(speed*0.5))*GAME.armReach*1.0;
    let sway2 = Math.cos(performance.now()/(speed*0.8))*(15+GAME.armReach*0.9);
    let erratic = GAME.armGlitchTimer > 0;

    if (erratic) {
        ctx.globalAlpha = 0.15;
        drawArm(M.sx+80, M.sy-10, lx-100+sway*1.5, orBot-40, true, true);
        drawArm(M.sx+M.sw-80, M.sy-10, lx+100-sway*1.5, orBot-40, true, false);

    drawArm(M.sx+80, M.sy-10, lx-100+sway, orBot-40, erratic, true);

    drawArm(M.sx+M.sw-180, M.sy-10, lx+50-sway2, orBot-45, erratic, false);

    // HUD
    if (GAME.state === 'PLAYING' || GAME.state === 'RESOLUTION') {
        drawRoundRect(M.sx+12, M.sy+6, M.sw-24, 44, 12, 'rgba(0,0,0,0.65)', null);

        for (let i = 0; i < GAME.maxHearts; i++) { drawText('❤', hx, M.sy+28, 32, i < GAME.hearts ? COLORS.red : '#444', 'left'); hx += 42; }
        const barX = hx + 15, barW = M.sx+M.sw-40 - barX;
        const pct = Math.max(0, GAME.anesthesia/GAME.anesthesiaMax);
        const barC = pct > 0.5 ? COLORS.green : pct > 0.2 ? COLORS.gold : COLORS.red;
        drawRoundRect(barX, M.sy+14, barW, 28, 14, '#1A1A1A', null);

        drawRoundRect(M.sx+M.sw/2-120, M.sy+12, 240, 36, 12, 'rgba(0,0,0,0.5)', null);

    }

    // LIVE HOSPITAL FEED badge
    const badgeW = 195;
    drawRoundRect(M.sx+M.sw-badgeW-15, M.sy+M.orH-32, badgeW, 28, 14, 'rgba(0,0,0,0.6)', null);

    drawText('LIVE HOSPITAL FEED', M.sx+M.sw-badgeW/2-10, M.sy+M.orH-18, 13, '#FFF', 'center', null, 0, 'bold');

    ctx.restore();
}

function drawPatient(cx, y) {
    // Bed — BIGGER (380 wide, 30 tall)
    drawRoundRect(cx-190, y+6, 380, 30, 10, '#BDBDBD', '#999', 2);
    // Bed legs
    drawRect(cx-165, y+36, 16, 26, '#888');
    drawRect(cx+149, y+36, 16, 26, '#888');
    // Head — BIGGER (22 radius)
    ctx.fillStyle = '#EAC086'; ctx.beginPath(); ctx.arc(cx-150, y+2, 22, 0, Math.PI*2); ctx.fill();
    // Surgical cap
    ctx.fillStyle = '#00ACC1'; ctx.beginPath(); ctx.arc(cx-150, y-3, 23, Math.PI, 0); ctx.fill();
    // Body/gown — scaled up
    let breath = Math.sin(performance.now()/500)*4;
    ctx.fillStyle = '#81D4FA'; ctx.strokeStyle = '#0288D1'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx-130, y+6); ctx.quadraticCurveTo(cx-40, y-36-breath, cx, y-18-breath);
    ctx.quadraticCurveTo(cx+80, y-28, cx+165, y+6); ctx.lineTo(cx-130, y+6);
    ctx.fill(); ctx.stroke();
    // Drape detail lines
    ctx.strokeStyle = 'rgba(2,136,209,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-80, y+2); ctx.lineTo(cx+100, y+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-60, y-4); ctx.lineTo(cx+80, y-6); ctx.stroke();
}

function drawArm(sx2, sy2, tx, ty, erratic, flip) {
    let dx = tx-sx2, dy = ty-sy2, bd = flip ? -1 : 1;
    let ex = sx2+dx*0.35+bd*50, ey = sy2+dy*0.5;
    let wx = sx2+dx*0.7+bd*18, wy = sy2+dy*0.85;
    if (erratic) { ex+=(Math.random()-0.5)*30; ey+=(Math.random()-0.5)*30; wx+=(Math.random()-0.5)*18; wy+=(Math.random()-0.5)*18; tx+=(Math.random()-0.5)*14; ty+=(Math.random()-0.5)*14; }
    ctx.lineWidth=22; ctx.strokeStyle = erratic ? '#FF4444' : '#455A64';
    ctx.beginPath(); ctx.moveTo(sx2, sy2); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.lineWidth=16; ctx.strokeStyle = erratic ? '#EF5350' : '#607D8B';
    ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(wx, wy); ctx.stroke();
    ctx.lineWidth=11; ctx.strokeStyle='#78909C';
    ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.fillStyle='#263238'; ctx.beginPath(); ctx.arc(sx2, sy2, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#37474F'; ctx.beginPath(); ctx.arc(ex, ey, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = erratic ? '#FF1744' : '#00E676'; ctx.beginPath(); ctx.arc(ex, ey, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#546E7A'; ctx.beginPath(); ctx.arc(wx, wy, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#E0E0E0'; ctx.strokeStyle='#B0BEC5'; ctx.lineWidth=2;
    if (flip) {
        ctx.beginPath(); ctx.moveTo(tx-5,ty); ctx.lineTo(tx+2,ty+24); ctx.lineTo(tx+8,ty); ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-7,ty+20); ctx.moveTo(tx,ty); ctx.lineTo(tx+7,ty+20); ctx.stroke();
    }
}

    drawRoundRect(rx+22, ry-55, 9, 62, 4, '#333', '#222', 2);
    drawRoundRect(rx+rw-31, ry-55, 9, 62, 4, '#333', '#222', 2);
    ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(rx+26, ry-58, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx+rw-27, ry-58, 8, 0, Math.PI*2); ctx.fill();
    // Center antenna
    drawRoundRect(rx+rw/2-4, ry-42, 8, 48, 4, '#333', '#222', 2);
    ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(rx+rw/2, ry-45, 7, 0, Math.PI*2); ctx.fill();
    // Status LEDs
    let lc = '#00E676';
    if (GAME.hazard === 'lag') lc = (Math.floor(performance.now()/200)%2===0) ? '#FF1744' : '#550000';
    ctx.fillStyle = lc;
    ctx.beginPath(); ctx.arc(rx+50, ry+30, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx+80, ry+30, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx+110, ry+30, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx+140, ry+30, 8, 0, Math.PI*2); ctx.fill();
    if (GAME.hazard !== 'lag') {
        ctx.fillStyle = 'rgba(0,230,118,0.15)';
        [50,80,110,140].forEach(xo => { ctx.beginPath(); ctx.arc(rx+xo, ry+30, 14, 0, Math.PI*2); ctx.fill(); });
    }
    drawText('TP-LEAK', rx+rw/2, ry+52, 11, '#444', 'center', null, 0, 'normal');
    if (GAME.routerFlashTimer > 0) {
        ctx.fillStyle = `rgba(255,255,255,${GAME.routerFlashTimer/150})`;
        ctx.roundRectPolyfill(rx, ry, rw, rh, 10); ctx.fill();
    }
    ctx.restore();

    // === MUG (moved right to clear router, with rotation) ===
    const mx2 = 220, my2 = dy + 80;
    const mugW = 75, mugH = 90;
    ctx.save();
    ctx.translate(mx2 + mugW/2, my2 + mugH/2);
    ctx.rotate(GAME.deskRotations.mug);
    ctx.translate(-(mx2 + mugW/2), -(my2 + mugH/2));
    drawShadowRoundRect(mx2, my2, mugW, mugH, 14, '#FAFAFA', '#E0E0E0', 3);
    ctx.strokeStyle = '#FAFAFA'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(mx2+mugW, my2+mugH*0.4, 20, -Math.PI*0.45, Math.PI*0.45); ctx.stroke();
    ctx.fillStyle = '#3E2723';
    ctx.beginPath(); ctx.ellipse(mx2+mugW/2, my2+10, mugW*0.38, 12, 0, 0, Math.PI*2); ctx.fill();
    // Steam
    ctx.strokeStyle = 'rgba(220,220,220,0.5)'; ctx.lineWidth = 3;
    let so = Math.sin(performance.now()/500)*8;
    ctx.beginPath(); ctx.moveTo(mx2+20, my2-6); ctx.quadraticCurveTo(mx2+26+so, my2-32, mx2+20, my2-55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx2+50, my2-4); ctx.quadraticCurveTo(mx2+56-so, my2-30, mx2+50, my2-52); ctx.stroke();
    ctx.restore();

    // === KEYBOARD (centered, with shake + rotation) — shake ×3 ===
    const kbW = 480, kbH = 120;
    const deskMidZone = CW - 265;
    const kbCenterX = (175 + deskMidZone) / 2;
    const kx = kbCenterX - kbW/2, ky = dy + 38;

    ctx.save();
    let kbShkX = 0, kbShkY = 0;
    if (GAME.kbShakeTimer > 0) {
        const intensity = GAME.kbShakeTimer / 180;
        kbShkX = (Math.random()-0.5) * 18 * intensity;
        kbShkY = (Math.random()-0.5) * 9 * intensity;
    }
    ctx.translate(kbCenterX + kbShkX, ky + kbH/2 + kbShkY);
    ctx.rotate(GAME.deskRotations.keyboard);
    ctx.translate(-kbCenterX, -(ky + kbH/2));

    const kbBroken = GAME.hazard === 'kbbreak';
    const kbBaseColor = kbBroken ? '#3A1A1A' : '#2A2A2A';
    const kbBorderColor = kbBroken ? '#661111' : '#1A1A1A';
    drawShadowRoundRect(kx, ky, kbW, kbH, 10, kbBaseColor, kbBorderColor, 3);
    drawRoundRect(kx+3, ky+3, kbW-6, kbH-6, 8, kbBroken ? '#332222' : '#333', null);
    const keyPad = 10, keyGap = 3;
    const keysPerRow = [14, 13, 12, 10];
    const rowH = 18, rowGap = 4;
    const keyAreaW = kbW - keyPad*2 - 80;
    for (let row = 0; row < 4; row++) {
        const rowY = ky + keyPad + row * (rowH + rowGap);
        const indent = row * 5;
        const availW = keyAreaW - indent;
        const keyW = (availW - (keysPerRow[row]-1)*keyGap) / keysPerRow[row];
        for (let k = 0; k < keysPerRow[row]; k++) {
            const keyX = kx + keyPad + indent + k * (keyW + keyGap);
            const keyColor = kbBroken ? '#553333' : '#444';
            drawRoundRect(keyX, rowY, keyW, rowH, 3, keyColor, '#333', 1);
        }
    }
    const spaceY = ky + keyPad + 4*(rowH+rowGap);
    drawRoundRect(kx + keyPad + 80, spaceY, 200, rowH, 5, kbBroken ? '#553333' : '#444', '#333', 1);

    // Arrow keys cluster
    const arrowArea = kx + kbW - 72;
    const arrowTop = ky + kbH - 58;
    const akSz = 20, akGap2 = 3;
    const akc = GAME.state === 'PLAYING' && !kbBroken ? '#00E676' : '#555';
    drawRoundRect(arrowArea + akSz + akGap2, arrowTop, akSz, akSz, 4, akc, '#222', 1);
    drawText('▲', arrowArea + akSz + akGap2 + akSz/2, arrowTop + akSz/2, 10, '#000', 'center');
    drawRoundRect(arrowArea, arrowTop + akSz + akGap2, akSz, akSz, 4, akc, '#222', 1);
    drawText('◀', arrowArea + akSz/2, arrowTop + akSz*1.5 + akGap2, 10, '#000', 'center');
    drawRoundRect(arrowArea + akSz + akGap2, arrowTop + akSz + akGap2, akSz, akSz, 4, akc, '#222', 1);
    drawText('▼', arrowArea + akSz + akGap2 + akSz/2, arrowTop + akSz*1.5 + akGap2, 10, '#000', 'center');
    drawRoundRect(arrowArea + (akSz + akGap2)*2, arrowTop + akSz + akGap2, akSz, akSz, 4, akc, '#222', 1);
    drawText('▶', arrowArea + (akSz + akGap2)*2 + akSz/2, arrowTop + akSz*1.5 + akGap2, 10, '#000', 'center');

    if (kbBroken && Math.random() > 0.7) {
        ctx.fillStyle = '#FF6F00';
        for (let sp = 0; sp < 3; sp++) {
            ctx.beginPath();
            ctx.arc(kx + 50 + Math.random()*(kbW-100), ky + 10 + Math.random()*(kbH-20), Math.random()*3+1, 0, Math.PI*2);
            ctx.fill();
        }
    }
    ctx.restore();

    // === MOUSE (right of keyboard, with shake + rotation) ===
    const msx = kx + kbW + 20;
    const msy = ky + kbH/2 - 42;
    const msW = 55, msH = 80;
    ctx.save();
    ctx.translate(msx + msW/2 + kbShkX*0.5, msy + msH/2 + kbShkY*0.5);
    ctx.rotate(GAME.deskRotations.mouse);
    ctx.translate(-(msx + msW/2), -(msy + msH/2));

    ctx.beginPath();
    ctx.ellipse(msx + msW/2, msy + msH/2, msW/2, msH/2, 0, 0, Math.PI * 2);
    ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 5;
    ctx.fillStyle = '#2A2A2A'; ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = '#1A1A1A'; ctx.lineWidth = 2; ctx.stroke();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(msx + msW/2, msy + 6); ctx.lineTo(msx + msW/2, msy + msH*0.4); ctx.stroke();
    drawRoundRect(msx + 6, msy + 6, msW/2 - 8, msH*0.3, 6, '#333', null);
    drawRoundRect(msx + msW/2 + 2, msy + 6, msW/2 - 8, msH*0.3, 6, '#303030', null);
    drawRoundRect(msx + msW/2 - 5, msy + 10, 10, 14, 5, '#555', '#444', 1);
    ctx.fillStyle = GAME.state === 'PLAYING' ? 'rgba(0,230,118,0.6)' : 'rgba(100,100,100,0.3)';
    ctx.beginPath(); ctx.arc(msx + msW/2, msy + msH - 12, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(msx + msW/2, msy);
    ctx.quadraticCurveTo(msx + msW/2, msy - 22, msx + msW/2 - 18, msy - 35);
    ctx.quadraticCurveTo(msx - 8, msy - 50, msx - 25, msy - 40);
    ctx.stroke();
    ctx.restore();

    // === TABLET / iPad (right side, with rotation) ===
    const px = CW - 265, py = dy + 2;
    const tw = 258, th = deskH - 8;
    ctx.save();
    ctx.translate(px + tw/2, py + th/2);
    ctx.rotate(GAME.deskRotations.tablet);
    ctx.translate(-(px + tw/2), -(py + th/2));

    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 15; ctx.shadowOffsetY = 6;
    drawRoundRect(px, py, tw, th, 18, '#3A3A3C', null);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    drawRoundRect(px+2, py+2, tw-4, th-4, 16, '#2C2C2E', null);
    drawRoundRect(px+7, py+10, tw-14, th-20, 8, '#0D1B2A', null);
    ctx.fillStyle = '#1C1C1E'; ctx.beginPath(); ctx.arc(px + tw/2, py + 6, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0A0A0A'; ctx.beginPath(); ctx.arc(px + tw/2, py + 6, 1.5, 0, Math.PI*2); ctx.fill();
    drawRoundRect(px + tw/2 - 30, py + th - 8, 60, 3, 2, '#555', null);

    // Bank app
    const bankH = 40;
    const bankPulse = (GAME.state === 'STORE' || (GAME.state === 'RESOLUTION' && GAME.lastResult === 'WIN'));
    if (bankPulse) {
        const glow = Math.abs(Math.sin(performance.now() / 300));
        ctx.shadowColor = '#4CAF50';
        ctx.shadowBlur = 8 + glow * 18;
    }
    drawRoundRect(px + 14, py + 18, tw - 28, bankH, 8, '#1B5E20', '#2E7D32', 2);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    drawText('💰', px + 30, py + 38, 16, '#FFF', 'center');
    const cashStr = '$' + GAME.cash;
    const cashSize = bankPulse ? 24 + Math.sin(performance.now()/200)*2 : 24;
    drawText(cashStr, px + tw/2 + 10, py + 38, cashSize, '#FFF', 'center');

    // Installed plugins section
    const plugY = py + 18 + bankH + 6;
    const plugH = th - bankH - 40;
    drawRoundRect(px + 14, plugY, tw - 28, plugH, 8, '#1A2332', '#2A3A4E', 2);
    drawText('PLUGINS', px + tw/2, plugY + 14, 11, '#6B7A8E', 'center', null, 0, 'normal');
    let apps = [];
    Object.entries(GAME.upgrades).forEach(([k,v]) => { if(v) { const it = STORE_ITEMS.find(i=>i.id===k); if(it) apps.push({icon: it.icon, name: it.title}); }});
    if (apps.length === 0) {
        drawText('None', px + tw/2, plugY + plugH/2, 14, '#444', 'center', null, 0, 'normal');
    } else {
        for (let i = 0; i < apps.length && i < 10; i++) {
            const col = i % 4, row = Math.floor(i / 4);
            const ix = px + 22 + col * 56;
            const iy = plugY + 28 + row * 50;
            drawRoundRect(ix, iy, 44, 40, 8, '#263248', '#3A4A5E', 1);
            drawText(apps[i].icon, ix + 22, iy + 20, 20, '#FFF', 'center');
        }
    }
    ctx.restore();
}

function drawScreenPlaying() {
    const M = MONITOR;
    ctx.save();
    ctx.beginPath(); ctx.roundRectPolyfill(M.sx, M.uiY, M.sw, M.uiH, 4); ctx.clip();
    drawRect(M.sx, M.uiY, M.sw, M.uiH, 'rgba(8,18,35,0.95)');

    // Info text — compact for smaller UI area
    drawText(GAME.flavorText, M.sx+M.sw/2, M.uiY+12, 13, '#7889A0', 'center', null, 0, 'normal');
    drawText(`${getRankName(GAME.rank)}  ·  Phase ${GAME.phasesCompleted}/${GAME.phasesNeeded}`, M.sx+M.sw/2, M.uiY+28, 17, '#FFF', 'center');

    // Arrow keys — sized to fill the panel
    const arrowY = M.uiY + 38;
    const maxSqH = M.uiH - 38 - 24;
    const sqW = Math.min(65, maxSqH);
    const sqGap = 8;
    const availW = M.sw - 50;
    const neededW = GAME.sequence.length * (sqW + sqGap) - sqGap;
    const finalSqW = neededW > availW ? Math.floor((availW - (GAME.sequence.length-1)*sqGap) / GAME.sequence.length) : sqW;
    const totalW = GAME.sequence.length * finalSqW + (GAME.sequence.length-1)*sqGap;
    let kx2 = M.sx + (M.sw - totalW)/2;
    const arrowCenterY = arrowY + (maxSqH - finalSqW)/2;

    for (let i = 0; i < GAME.sequence.length; i++) {
        let bg = '#2A3A4E', txt = '#AAA', sc = 1;
        if (i < GAME.currentIndex) { bg = COLORS.green; txt = '#000'; }
        else if (i === GAME.currentIndex) { bg = COLORS.gold; txt = '#000'; sc = 1+Math.sin(performance.now()/100)*0.08; }
        if (i === GAME.currentIndex-1 && GAME.arrowPopTimer > 0) sc = 1+(GAME.arrowPopTimer/100)*0.2;
        if (GAME.hazard === 'lag') { bg = '#333'; txt = '#555'; }
        let aw = finalSqW*sc, ax = kx2+(finalSqW-aw)/2, ay = arrowCenterY+(finalSqW-aw)/2;
        drawRoundRect(ax, ay, aw, aw, 12, bg, null);
        drawText(ARROW_SYM[GAME.sequence[i]], kx2+finalSqW/2, arrowCenterY+finalSqW/2, 34*sc, txt, 'center');
        kx2 += finalSqW + sqGap;
    }

    // Timer bar
    const barY = M.uiY + M.uiH - 18;
    const pPct = Math.max(0, GAME.phaseTimer/GAME.phaseTimerMax);
    drawRoundRect(M.sx+40, barY, M.sw-80, 14, 7, '#1A1A1A', '#333', 2);
    if ((M.sw-88)*pPct > 4) drawRoundRect(M.sx+44, barY+2, (M.sw-88)*pPct, 10, 5, COLORS.red, null);

    if (GAME.greenFlashTimer > 0) {
        ctx.fillStyle = `rgba(0,230,118,${Math.min(0.35, GAME.greenFlashTimer/150)})`;
        ctx.fillRect(M.sx, M.uiY, M.sw, M.uiH);
    }
    ctx.restore();
}

function drawScreenResolution() {
    const M = MONITOR;
    ctx.save();

    const isWin = GAME.lastResult === 'WIN';
    drawRect(M.sx, M.sy, M.sw, M.sh, isWin ? '#0D2818' : '#2A0A0A');

    if (GAME.showQuitConfirm) {
        drawShadowRoundRect(M.sx+M.sw/2-210, M.sy+M.sh/2-75, 420, 170, 16, '#1A1A2E', '#555', 2);
        drawText('ARE YOU SURE?', M.sx+M.sw/2, M.sy+M.sh/2-38, 34, COLORS.red, 'center');

        if (!canAfford) {
            drawText('Not enough cash to retry!', M.sx+M.sw/2, M.sy+235, 18, COLORS.red, 'center', null, 0, 'normal');
            drawText('Visit Scamazon or quit.', M.sx+M.sw/2, M.sy+255, 15, '#888', 'center', null, 0, 'normal');
        }
    }

    const btnW=220, btnH=55, gap=20, total=btnW*3+gap*2;
    const bx0 = M.sx+(M.sw-total)/2, by = M.sy+M.sh-80;
    if (isWin) {
        drawButton('NEXT OP', bx0, by, btnW, btnH, COLORS.green, 22, true);
        drawButton('SCAMAZON', bx0+btnW+gap, by, btnW, btnH, COLORS.scamOrange, 22);
        drawButton('QUIT', bx0+(btnW+gap)*2, by, btnW, btnH, COLORS.red, 22);
    } else {
        const retryCost = (GAME.rank+1)*300;
        const canAfford = GAME.cash >= retryCost;
        const rt = canAfford ? `RETRY (-$${retryCost})` : `RETRY ($${retryCost})`;
        const rc = canAfford ? COLORS.gold : '#444';
        drawButton(rt, bx0, by, btnW, btnH, rc, 18, canAfford);
        drawButton('SCAMAZON', bx0+btnW+gap, by, btnW, btnH, COLORS.scamOrange, 22);
        drawButton('QUIT', bx0+(btnW+gap)*2, by, btnW, btnH, COLORS.red, 22);
    }
    ctx.restore();
}
